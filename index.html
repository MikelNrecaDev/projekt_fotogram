<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js" defer></script>
    <script src="script.js" defer></script>
    <script src="templates.js" defer></script>
</head>

<body onload="init()" class="body">
    <header class="header">
        <div class="header_logo_field">
            <img src="./assets/img/fotogram_header_logo.png" class="header_logo">
        </div>
    </header>
    <main class="main_section">
        <section onclick="OpenDetailView()" class="gallery" id="gallery">
        </section>
        <section id="detail-box" class="detail-box">
            <button id="backward" class="left_button">
                <img src="./assets/img/PfeilLinks.png"> 
            </button>
            <button id="forward" class="right_button">
                <img src="./assets/img/PfeilRechts.png">
            </button>
             <button id="close" class="close_window" onclick="closeDetailView()">
                <img src="./assets/img/Exit.png" alt="">
            </button>
        </section>
    </main>
    <footer class="footer">
        <img src="./assets/img/footer_logo.png" class="footer_logo">
    </footer>
</body>
</html>
